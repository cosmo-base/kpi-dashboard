# Sample workflow for building and deploying a Next.js site to GitHub Pages
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
            
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        
      - name: Build with Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build

      # ==========================================
      # ★ パスワード暗号化ステップ（index.htmlと404.htmlを確実に上書き）
      # ==========================================
      - name: Encrypt HTML files with StatiCrypt
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          # 1. パスワードの存在チェック
          if [ -z "$SITE_PASSWORD" ]; then
            echo "❌ エラー: GitHub Secrets に SITE_PASSWORD が設定されていません！"
            exit 1
          fi

          # 2. 暗号化ツールのインストール
          npm install -g staticrypt

          # 3. outフォルダの中にあるHTML（index.htmlと404.html）を確実に暗号化
          find ./out -type f -name "*.html" | while read -r file; do
            echo "🔒 $file を暗号化しています..."
            
            # 一旦 .enc という拡張子をつけて暗号化ファイルを生成
            staticrypt "$file" -p "$SITE_PASSWORD" -o "${file}.enc" --short --template-title "Cosmo Base 運営ダッシュボード"
            
            # 生成に成功していれば、元のHTMLファイルに上書きする！
            if [ -f "${file}.enc" ]; then
              mv "${file}.enc" "$file"
              echo "✅ 成功: $file にパスワードをかけました"
            else
              echo "❌ 失敗: $file の暗号化に失敗しました"
              exit 1
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

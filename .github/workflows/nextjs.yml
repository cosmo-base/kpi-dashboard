# .github/workflows/nextjs.yml
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci --legacy-peer-deps" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
            
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        
      - name: Build with Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build

      # ==========================================
      # ★ パスワード暗号化ステップ（最強の確実な上書き版）
      # ==========================================
      - name: Encrypt HTML files with StatiCrypt
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          if [ -z "$SITE_PASSWORD" ]; then
            echo "❌ エラー: GitHub Secrets に SITE_PASSWORD が設定されていません！"
            exit 1
          fi

          # 出来上がったサイトデータのフォルダ(out)に移動
          cd out
          
          # フォルダ内にあるHTMLを1つずつ見つけて暗号化
          find . -type f -name "*.html" | while read -r file; do
            echo "🔒 $file を暗号化しています..."
            
            # パスのズレを防ぐため、対象ファイルがあるフォルダまで移動して実行する
            dir=$(dirname "$file")
            base=$(basename "$file")
            
            (
              cd "$dir"
              # 1. ツールを実行 (勝手に encrypted/ フォルダに出力されます)
              npx --yes staticrypt@latest "$base" -p "$SITE_PASSWORD" --short --template-title "Cosmo Base 運営ダッシュボード"
              
              # 2. 生成された暗号化ファイルを、元のHTMLファイルに強制的に上書き！
              if [ -f "encrypted/$base" ]; then
                cp "encrypted/$base" "$base"
                rm -rf encrypted
              else
                exit 1 # ファイルが見つからなければエラーにする
              fi
            )
            
            # エラーが起きた場合はビルド全体を止める
            if [ $? -ne 0 ]; then
              echo "❌ 失敗: $file の暗号化に失敗しました"
              exit 1
            fi
            
            echo "✅ 成功: $file にパスワードをかけました"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
